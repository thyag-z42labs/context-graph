inherits: _base

domain:
  id: clinical-trials
  name: Clinical Trials
  description: Clinical study operations, country and site performance, milestones, budget, data management, and quality metrics
  tagline: "Study Operations Context Graph"
  emoji: "\U0001F9EA"

entity_types:
  - label: Study
    pole_type: OBJECT
    subtype: CLINICAL_STUDY
    color: "#0891b2"
    icon: clipboard-list
    properties:
      - name: study_id
        type: string
        required: true
        unique: true
      - name: study_name
        type: string
        required: true
      - name: therapy_area
        type: string
      - name: indication
        type: string
      - name: primary_asset_name
        type: string
      - name: priority_study_flag
        type: boolean
      - name: study_phase
        type: string
        enum: [phase_1, phase_2a, phase_3]
      - name: sourcing_strategy
        type: string
        enum: [insourced, outsourced]
      - name: study_status
        type: string
        enum: [enrolling]
      - name: operational_phase
        type: string
        enum: [active]
      - name: overall_health_score
        type: integer
      - name: next_milestone_name
        type: string
      - name: next_milestone_planned_date
        type: date
      - name: budget_planned
        type: float
      - name: budget_actual_spent
        type: float
      - name: budget_forecasted
        type: float
      - name: percent_budget_spent
        type: float

  - label: StudyCountry
    pole_type: LOCATION
    subtype: STUDY_COUNTRY
    color: "#7c3aed"
    icon: map
    properties:
      - name: study_country_id
        type: string
        required: true
        unique: true
      - name: study_id
        type: string
        required: true
      - name: country_name
        type: string
        required: true
      - name: region_name
        type: string
      - name: study_country_status
        type: string
        enum: [active, closed, enrolling, enrollment_complete, not_yet_activated]
      - name: sites_activated_planned
        type: integer
      - name: sites_activated_actual
        type: integer
      - name: subjects_enrolled_planned
        type: integer
      - name: subjects_enrolled_actual
        type: integer
      - name: enrollment_status
        type: string
      - name: alert_severity
        type: string
      - name: overall_health_score
        type: integer

  - label: StudySite
    pole_type: LOCATION
    subtype: STUDY_SITE
    color: "#0f766e"
    icon: building-2
    properties:
      - name: site_number
        type: string
        required: true
        unique: true
      - name: study_id
        type: string
        required: true
      - name: country_name
        type: string
      - name: site_name
        type: string
      - name: site_state
        type: string
      - name: site_city
        type: string
      - name: site_address
        type: string
      - name: site_zipcode
        type: string
      - name: study_site_status
        type: string
        enum: [active, closed, concluded, enrolling, enrollment_complete, initiated, not_yet_activated, planned, selected]
      - name: principal_investigator
        type: string
      - name: non_enrolling_flag
        type: boolean
      - name: non_enrolling_days
        type: integer
      - name: alert_severity
        type: string

  - label: StudyMilestone
    pole_type: EVENT
    subtype: STUDY_MILESTONE
    color: "#ea580c"
    icon: flag
    properties:
      - name: milestone_id
        type: string
        required: true
        unique: true
      - name: study_id
        type: string
        required: true
      - name: country_name
        type: string
      - name: site_number
        type: string
      - name: milestone_level
        type: string
        enum: [study, country, site]
      - name: milestone_name
        type: string
        required: true
      - name: abbreviation_name
        type: string
      - name: milestone_sequence
        type: integer
      - name: planned_date
        type: date
      - name: actual_date
        type: date
      - name: forecasted_date
        type: date
      - name: milestone_status
        type: string
        enum: [on_time, slight_delay, delay, yet_to_be_achieved]
      - name: current_milestone_flag
        type: boolean
      - name: next_milestone_flag
        type: boolean

  - label: MilestoneCycle
    pole_type: OBJECT
    subtype: MILESTONE_CYCLE_TIME
    color: "#ca8a04"
    icon: timer
    properties:
      - name: cycle_id
        type: string
        required: true
        unique: true
      - name: study_id
        type: string
        required: true
      - name: cycle_name
        type: string
        required: true
      - name: therapy_area
        type: string
      - name: indication
        type: string
      - name: start_planned_date
        type: date
      - name: start_actual_date
        type: date
      - name: end_planned_date
        type: date
      - name: end_actual_date
        type: date
      - name: planned_cycle_time_days
        type: integer
      - name: actual_cycle_time_days
        type: integer
      - name: industry_benchmark_weeks
        type: integer
      - name: sponsor_target_weeks
        type: integer

  - label: OperationalPerformance
    pole_type: OBJECT
    subtype: OPERATIONAL_PERFORMANCE_METRIC
    color: "#db2777"
    icon: activity
    properties:
      - name: performance_id
        type: string
        required: true
        unique: true
      - name: study_id
        type: string
        required: true
      - name: country_name
        type: string
      - name: site_number
        type: string
      - name: scope_level
        type: string
        enum: [study, country, site]
      - name: sites_activated_planned
        type: integer
      - name: sites_activated_actual
        type: integer
      - name: subjects_enrolled_planned
        type: integer
      - name: subjects_enrolled_actual
        type: integer
      - name: subjects_screened_actual
        type: integer
      - name: subjects_completed_actual
        type: integer
      - name: subjects_dropout_actual
        type: integer
      - name: subjects_screened_failed_actual
        type: integer
      - name: enrollment_rate_planned
        type: float
      - name: enrollment_rate_actual
        type: float
      - name: screen_failure_rate_actual
        type: float
      - name: dropout_rate_actual
        type: float

  - label: DataManagementMetric
    pole_type: OBJECT
    subtype: DATA_MANAGEMENT_METRIC
    color: "#4f46e5"
    icon: database
    properties:
      - name: data_metric_id
        type: string
        required: true
        unique: true
      - name: study_id
        type: string
        required: true
      - name: country_name
        type: string
      - name: site_number
        type: string
      - name: scope_level
        type: string
        enum: [study, country, site]
      - name: crf_expected
        type: integer
      - name: crf_entered
        type: integer
      - name: crf_verified
        type: integer
      - name: crf_signed
        type: integer
      - name: crf_freezed
        type: integer
      - name: sdv_completed
        type: integer
      - name: sdv_required
        type: integer
      - name: percent_crf_entered
        type: float
      - name: percent_sdv_completed
        type: float
      - name: queries_raised
        type: integer
      - name: open_queries
        type: integer
      - name: avg_days_query_open_to_close
        type: float

  - label: QualityMetric
    pole_type: OBJECT
    subtype: QUALITY_METRIC
    color: "#dc2626"
    icon: shield-alert
    properties:
      - name: quality_metric_id
        type: string
        required: true
        unique: true
      - name: study_id
        type: string
        required: true
      - name: country_name
        type: string
      - name: site_number
        type: string
      - name: scope_level
        type: string
        enum: [study, country, site]
      - name: protocol_amendments
        type: integer
      - name: substantial_protocol_amendments
        type: integer
      - name: significant_protocol_deviations
        type: integer
      - name: non_significant_protocol_deviations
        type: integer
      - name: avg_days_mvr_submitted_to_approved
        type: float
      - name: critical_internal_audit_observations
        type: integer
      - name: major_internal_audit_observations
        type: integer
      - name: critical_external_audit_observations
        type: integer
      - name: major_external_audit_observations
        type: integer
      - name: capa_closed_ontime
        type: integer
      - name: capa_closed_overdue
        type: integer
      - name: capa_open_overdue
        type: integer
      - name: serious_breaches
        type: integer
      - name: serious_breaches_reported_to_ha
        type: integer

relationships:
  - type: HAS_COUNTRY
    source: Study
    target: StudyCountry
  - type: HAS_SITE
    source: Study
    target: StudySite
  - type: COUNTRY_HAS_SITE
    source: StudyCountry
    target: StudySite
  - type: HAS_MILESTONE
    source: Study
    target: StudyMilestone
  - type: COUNTRY_HAS_MILESTONE
    source: StudyCountry
    target: StudyMilestone
  - type: SITE_HAS_MILESTONE
    source: StudySite
    target: StudyMilestone
  - type: HAS_CYCLE_TIME
    source: Study
    target: MilestoneCycle
  - type: HAS_OPERATIONAL_PERFORMANCE
    source: Study
    target: OperationalPerformance
  - type: COUNTRY_HAS_OPERATIONAL_PERFORMANCE
    source: StudyCountry
    target: OperationalPerformance
  - type: SITE_HAS_OPERATIONAL_PERFORMANCE
    source: StudySite
    target: OperationalPerformance
  - type: HAS_DATA_MANAGEMENT_METRIC
    source: Study
    target: DataManagementMetric
  - type: COUNTRY_HAS_DATA_MANAGEMENT_METRIC
    source: StudyCountry
    target: DataManagementMetric
  - type: SITE_HAS_DATA_MANAGEMENT_METRIC
    source: StudySite
    target: DataManagementMetric
  - type: HAS_QUALITY_METRIC
    source: Study
    target: QualityMetric
  - type: COUNTRY_HAS_QUALITY_METRIC
    source: StudyCountry
    target: QualityMetric
  - type: SITE_HAS_QUALITY_METRIC
    source: StudySite
    target: QualityMetric

document_templates:
  - id: study_operations_summary
    name: Study Operations Summary
    description: Summary of a study's status, health scores, next milestone, enrollment, and budget
    count: 5
    prompt_template: |
      Write an operations summary for study {{study.study_name}} ({{study.study_id}})
      in {{study.therapy_area}} / {{study.indication}}. Include study phase
      {{study.study_phase}}, sourcing strategy {{study.sourcing_strategy}},
      overall health score {{study.overall_health_score}}, next milestone
      {{study.next_milestone_name}}, and budget planned/actual/forecasted values.
    required_entities: [Study]

  - id: country_performance_review
    name: Country Performance Review
    description: Review of country-level activation, enrollment, and health status
    count: 6
    prompt_template: |
      Write a country performance review for {{study_country.country_name}} in
      study {{study.study_name}}. Include region {{study_country.region_name}},
      country status {{study_country.study_country_status}}, planned and actual
      activated sites, planned and actual enrolled subjects, alert severity,
      and overall health score.
    required_entities: [Study, StudyCountry]

  - id: site_performance_note
    name: Site Performance Note
    description: Site-level operational note using enrollment and non-enrollment fields
    count: 8
    prompt_template: |
      Write a site performance note for {{study_site.site_number}}
      ({{study_site.site_name}}) in {{study_site.country_name}} for study
      {{study.study_name}}. Include site status {{study_site.study_site_status}},
      principal investigator {{study_site.principal_investigator}},
      non-enrolling flag {{study_site.non_enrolling_flag}}, non-enrolling days,
      and alert severity.
    required_entities: [Study, StudySite]

  - id: milestone_tracking_report
    name: Milestone Tracking Report
    description: Report on planned, actual, forecasted, current, and next milestones
    count: 6
    prompt_template: |
      Write a milestone tracking report for {{study.study_name}} covering
      {{study_milestone.milestone_name}} ({{study_milestone.abbreviation_name}}).
      Include milestone level {{study_milestone.milestone_level}}, planned date,
      actual date, forecasted date, milestone status, current milestone flag,
      and next milestone flag.
    required_entities: [Study, StudyMilestone]

  - id: data_quality_review
    name: Data and Quality Review
    description: Data management and quality metric review for a study, country, or site
    count: 6
    prompt_template: |
      Write a data and quality review for {{study.study_name}} using
      {{data_management_metric.scope_level}}-level data. Include CRF expected,
      entered, verified, signed, frozen, SDV completed/required, queries raised,
      open queries, protocol deviations, audit observations, CAPA counts, and
      serious breaches.
    required_entities: [Study, DataManagementMetric, QualityMetric]

decision_traces:
  - id: study_health_review
    task: "Review operational health for study {{study.study_id}}"
    steps:
      - thought: "Start with study-level health, status, next milestone, and budget fields"
        action: "Query Study by study_id and inspect overall_health_score, study_status, next_milestone_name, budget_planned, budget_actual_spent, and budget_forecasted"
      - thought: "Check enrollment and activation performance at study level"
        action: "Traverse HAS_OPERATIONAL_PERFORMANCE to compare planned and actual sites and subjects"
      - thought: "Check data management and quality pressure"
        action: "Traverse HAS_DATA_MANAGEMENT_METRIC and HAS_QUALITY_METRIC for CRF, query, protocol deviation, audit, CAPA, and serious breach counts"
    outcome_template: "Study health: {{health_status}}. Main drivers: {{drivers}}. Recommended follow-up: {{follow_up}}"

  - id: country_enrollment_review
    task: "Assess country enrollment performance for {{study_country.country_name}} in {{study.study_id}}"
    steps:
      - thought: "Review country status and planned versus actual activation and enrollment"
        action: "Query StudyCountry and COUNTRY_HAS_OPERATIONAL_PERFORMANCE metrics for the requested study and country"
      - thought: "Find country milestones that are current or next"
        action: "Traverse COUNTRY_HAS_MILESTONE and filter current_milestone_flag or next_milestone_flag"
      - thought: "Check whether quality or data management issues could explain performance"
        action: "Traverse COUNTRY_HAS_DATA_MANAGEMENT_METRIC and COUNTRY_HAS_QUALITY_METRIC"
    outcome_template: "Country performance: {{status}}. Enrollment gap: {{gap}}. Related issues: {{issues}}"

  - id: site_non_enrollment_review
    task: "Investigate non-enrolling site {{study_site.site_number}}"
    steps:
      - thought: "Confirm the site status and non-enrollment indicators"
        action: "Query StudySite by site_number and inspect study_site_status, non_enrolling_flag, non_enrolling_days, and alert_severity"
      - thought: "Compare planned and actual site enrollment"
        action: "Traverse SITE_HAS_OPERATIONAL_PERFORMANCE for enrolled, screened, completed, dropout, and screen-failure metrics"
      - thought: "Review site milestones and quality findings"
        action: "Traverse SITE_HAS_MILESTONE and SITE_HAS_QUALITY_METRIC for delayed milestones, protocol deviations, audit observations, CAPA, and serious breaches"
    outcome_template: "Site issue summary: {{summary}}. Likely blockers: {{blockers}}. Action owner: {{owner}}"

  - id: milestone_delay_review
    task: "Explain milestone delays for study {{study.study_id}}"
    steps:
      - thought: "Find delayed or not-yet-achieved study, country, and site milestones"
        action: "Query StudyMilestone records linked to the study where milestone_status is delay, slight_delay, or yet_to_be_achieved"
      - thought: "Review cycle time gaps versus benchmark and sponsor target"
        action: "Traverse HAS_CYCLE_TIME and compare planned_cycle_time_days, actual_cycle_time_days, industry_benchmark_weeks, and sponsor_target_weeks"
      - thought: "Identify countries and sites associated with current or next delayed milestones"
        action: "Traverse COUNTRY_HAS_MILESTONE and SITE_HAS_MILESTONE relationships"
    outcome_template: "Milestone risk: {{risk}}. Delayed milestones: {{milestones}}. Cycle-time variance: {{variance}}"

  - id: data_management_review
    task: "Assess data management status for study {{study.study_id}}"
    steps:
      - thought: "Review CRF entry, verification, signing, freezing, and SDV completion"
        action: "Query DataManagementMetric records by study_id and scope_level"
      - thought: "Assess query burden and query aging"
        action: "Compare queries_raised, open_queries, and avg_days_query_open_to_close across study, country, and site metrics"
      - thought: "Connect data issues to operational units"
        action: "Traverse HAS_DATA_MANAGEMENT_METRIC, COUNTRY_HAS_DATA_MANAGEMENT_METRIC, and SITE_HAS_DATA_MANAGEMENT_METRIC"
    outcome_template: "Data management status: {{status}}. Query risk: {{query_risk}}. Units needing attention: {{units}}"

  - id: quality_risk_review
    task: "Assess quality risk for study {{study.study_id}}"
    steps:
      - thought: "Review protocol amendments and deviations"
        action: "Query QualityMetric records for protocol_amendments, substantial_protocol_amendments, significant_protocol_deviations, and non_significant_protocol_deviations"
      - thought: "Review monitoring visit report timing, audit observations, and CAPA status"
        action: "Inspect avg_days_mvr_submitted_to_approved, audit observation counts, capa_closed_overdue, and capa_open_overdue"
      - thought: "Check serious breach counts and health authority reporting"
        action: "Compare serious_breaches with serious_breaches_reported_to_ha across study, country, and site scope levels"
    outcome_template: "Quality risk: {{risk_level}}. Key findings: {{findings}}. Escalations: {{escalations}}"

demo_scenarios:
  - name: Study Overview
    prompts:
      - "Show all enrolling studies with health scores and next milestones"
      - "Which studies are over budget or forecasted above planned budget?"
      - "Summarize operational health for study STU-2026-0003"

  - name: Country and Site Performance
    prompts:
      - "Which countries have fewer actual enrolled subjects than planned?"
      - "Find non-enrolling sites and show their non-enrolling days"
      - "Show site performance for Site-124"

  - name: Milestones and Quality
    prompts:
      - "List delayed or not-yet-achieved milestones for a study"
      - "Which sites have serious breaches reported to HA?"
      - "Compare CRF entered and SDV completed percentages by country"

agent_tools:
  - name: search_studies
    description: Search studies by ID, name, therapy area, indication, or asset
    cypher: |
      MATCH (s:Study)
      WHERE toLower(s.study_id) CONTAINS toLower($query)
         OR toLower(s.study_name) CONTAINS toLower($query)
         OR toLower(s.therapy_area) CONTAINS toLower($query)
         OR toLower(s.indication) CONTAINS toLower($query)
         OR toLower(s.primary_asset_name) CONTAINS toLower($query)
      OPTIONAL MATCH (s)-[r]-(related)
      RETURN s, type(r) AS relationship, labels(related) AS related_labels,
             related.study_country_id AS study_country_id,
             related.site_number AS site_number,
             related.milestone_name AS milestone_name
      LIMIT 25
    parameters:
      - name: query
        type: string
        description: Study ID, name, therapy area, indication, or asset

  - name: list_studies
    description: List study records with optional limit
    cypher: |
      MATCH (s:Study)
      RETURN s
      ORDER BY s.study_id
      LIMIT toInteger($limit)
    parameters:
      - name: limit
        type: string
        description: Maximum number of studies to return

  - name: get_study_by_id
    description: Get a study with countries, sites, milestones, cycle times, operational, data management, and quality metrics
    cypher: |
      MATCH (s:Study {study_id: $study_id})
      OPTIONAL MATCH (s)-[:HAS_COUNTRY]->(country:StudyCountry)
      OPTIONAL MATCH (s)-[:HAS_SITE]->(site:StudySite)
      OPTIONAL MATCH (s)-[:HAS_MILESTONE]->(milestone:StudyMilestone)
      OPTIONAL MATCH (s)-[:HAS_CYCLE_TIME]->(cycle:MilestoneCycle)
      OPTIONAL MATCH (s)-[:HAS_OPERATIONAL_PERFORMANCE]->(ops:OperationalPerformance)
      OPTIONAL MATCH (s)-[:HAS_DATA_MANAGEMENT_METRIC]->(dm:DataManagementMetric)
      OPTIONAL MATCH (s)-[:HAS_QUALITY_METRIC]->(qm:QualityMetric)
      RETURN s, collect(DISTINCT country) AS countries,
             collect(DISTINCT site) AS sites,
             collect(DISTINCT milestone) AS milestones,
             collect(DISTINCT cycle) AS cycle_times,
             collect(DISTINCT ops) AS operational_metrics,
             collect(DISTINCT dm) AS data_management_metrics,
             collect(DISTINCT qm) AS quality_metrics
      LIMIT 1
    parameters:
      - name: study_id
        type: string
        description: Study study_id

  - name: get_country_performance
    description: Get country-level operational, data management, quality, and milestone context for a study country
    cypher: |
      MATCH (s:Study {study_id: $study_id})-[:HAS_COUNTRY]->(country:StudyCountry {country_name: $country_name})
      OPTIONAL MATCH (country)-[:COUNTRY_HAS_OPERATIONAL_PERFORMANCE]->(ops:OperationalPerformance)
      OPTIONAL MATCH (country)-[:COUNTRY_HAS_DATA_MANAGEMENT_METRIC]->(dm:DataManagementMetric)
      OPTIONAL MATCH (country)-[:COUNTRY_HAS_QUALITY_METRIC]->(qm:QualityMetric)
      OPTIONAL MATCH (country)-[:COUNTRY_HAS_MILESTONE]->(milestone:StudyMilestone)
      RETURN s, country, ops, dm, qm, collect(DISTINCT milestone) AS milestones
      LIMIT 1
    parameters:
      - name: study_id
        type: string
        description: Study study_id
      - name: country_name
        type: string
        description: Country name

  - name: get_site_by_number
    description: Get site details with operational, data management, quality, and milestone context
    cypher: |
      MATCH (site:StudySite {site_number: $site_number})
      OPTIONAL MATCH (s:Study)-[:HAS_SITE]->(site)
      OPTIONAL MATCH (country:StudyCountry)-[:COUNTRY_HAS_SITE]->(site)
      OPTIONAL MATCH (site)-[:SITE_HAS_OPERATIONAL_PERFORMANCE]->(ops:OperationalPerformance)
      OPTIONAL MATCH (site)-[:SITE_HAS_DATA_MANAGEMENT_METRIC]->(dm:DataManagementMetric)
      OPTIONAL MATCH (site)-[:SITE_HAS_QUALITY_METRIC]->(qm:QualityMetric)
      OPTIONAL MATCH (site)-[:SITE_HAS_MILESTONE]->(milestone:StudyMilestone)
      RETURN s, country, site, ops, dm, qm, collect(DISTINCT milestone) AS milestones
      LIMIT 1
    parameters:
      - name: site_number
        type: string
        description: Site number

  - name: find_non_enrolling_sites
    description: Find sites flagged as non-enrolling or with non-enrolling days
    cypher: |
      MATCH (site:StudySite)
      WHERE site.non_enrolling_flag = true
         OR site.non_enrolling_days > 0
      OPTIONAL MATCH (s:Study)-[:HAS_SITE]->(site)
      OPTIONAL MATCH (site)-[:SITE_HAS_OPERATIONAL_PERFORMANCE]->(ops:OperationalPerformance)
      RETURN s.study_id AS study_id, s.study_name AS study_name, site, ops
      ORDER BY site.non_enrolling_days DESC
      LIMIT 50
    parameters: []

  - name: list_delayed_milestones
    description: List delayed, slightly delayed, or yet-to-be-achieved milestones for a study
    cypher: |
      MATCH (s:Study {study_id: $study_id})
      OPTIONAL MATCH (s)-[:HAS_MILESTONE]->(study_milestone:StudyMilestone)
      OPTIONAL MATCH (s)-[:HAS_COUNTRY]->(:StudyCountry)-[:COUNTRY_HAS_MILESTONE]->(country_milestone:StudyMilestone)
      OPTIONAL MATCH (s)-[:HAS_SITE]->(:StudySite)-[:SITE_HAS_MILESTONE]->(site_milestone:StudyMilestone)
      WITH collect(DISTINCT study_milestone) +
           collect(DISTINCT country_milestone) +
           collect(DISTINCT site_milestone) AS milestones
      UNWIND milestones AS milestone
      WITH DISTINCT milestone
      WHERE milestone IS NOT NULL
        AND milestone.milestone_status IN ["delay", "slight_delay", "yet_to_be_achieved"]
      RETURN DISTINCT milestone
      ORDER BY milestone.planned_date, milestone.milestone_sequence
      LIMIT 100
    parameters:
      - name: study_id
        type: string
        description: Study study_id

  - name: compare_data_quality_by_country
    description: Compare CRF, SDV, query, protocol deviation, CAPA, and serious breach metrics across countries for a study
    cypher: |
      MATCH (s:Study {study_id: $study_id})-[:HAS_COUNTRY]->(country:StudyCountry)
      OPTIONAL MATCH (country)-[:COUNTRY_HAS_DATA_MANAGEMENT_METRIC]->(dm:DataManagementMetric)
      OPTIONAL MATCH (country)-[:COUNTRY_HAS_QUALITY_METRIC]->(qm:QualityMetric)
      RETURN country.country_name AS country_name,
             dm.percent_crf_entered AS percent_crf_entered,
             dm.percent_sdv_completed AS percent_sdv_completed,
             dm.queries_raised AS queries_raised,
             dm.open_queries AS open_queries,
             qm.significant_protocol_deviations AS significant_protocol_deviations,
             qm.capa_open_overdue AS capa_open_overdue,
             qm.serious_breaches AS serious_breaches
      ORDER BY country.country_name
      LIMIT 100
    parameters:
      - name: study_id
        type: string
        description: Study study_id

system_prompt: |
  You are an AI clinical study operations assistant backed by a graph built from
  study details, country details, site details, milestone tracking, milestone
  cycle times, operational performance, budget, data management, and quality
  metric tables.

  Ground answers in graph entities and relationships. Use the exact study,
  country, site, milestone, operational, data management, and quality metrics
  available in the graph. Do not introduce unsupported participant, safety-event,
  endpoint, treatment-arm, or medical-outcome concepts unless those entities are
  present in the graph.

  Focus on operational questions: study health, enrollment performance, site
  activation, non-enrolling sites, milestone delays, budget status, CRF/SDV
  progress, query burden, protocol deviations, audit observations, CAPA status,
  and serious breaches.

visualization:
  node_colors:
    Study: "#0891b2"
    StudyCountry: "#7c3aed"
    StudySite: "#0f766e"
    StudyMilestone: "#ea580c"
    MilestoneCycle: "#ca8a04"
    OperationalPerformance: "#db2777"
    DataManagementMetric: "#4f46e5"
    QualityMetric: "#dc2626"
  node_sizes:
    Study: 30
    StudyCountry: 24
    StudySite: 24
    StudyMilestone: 18
    MilestoneCycle: 18
    OperationalPerformance: 18
    DataManagementMetric: 18
    QualityMetric: 18
  default_cypher: "MATCH (s:Study)-[r]-(m) RETURN s, r, m LIMIT 100"
